<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#111827"/>

  <!-- Cart handle bar -->
  <path d="M6 15 L15 15" stroke="#FBBF24" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Cart arm -->
  <path d="M15 15 L20 25" stroke="#FBBF24" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Cart basket (trapezoid) -->
  <path d="M20 25 L58 25 L55 42 L23 42 Z" fill="#FBBF24"/>
  <!-- Top rim -->
  <path d="M20 25 L58 25" stroke="#FCD34D" stroke-width="3" stroke-linecap="round"/>
  <!-- Checkmark inside -->
  <path d="M30 33 L36 39 L46 28"
        stroke="#1F2937" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left wheel -->
  <circle cx="29" cy="50" r="4" fill="#FBBF24"/>
  <!-- Right wheel -->
  <circle cx="47" cy="50" r="4" fill="#FBBF24"/>
</svg>
